<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌹 Para ti</title>
  <style>
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .rosa {
      width: 80vw;
      max-width: 350px;
      opacity: 0;
      transform: scale(0.5);
      animation: aparecer 3s ease-out 0.5s forwards;
      filter: drop-shadow(0 0 20px rgba(255,0,0,0.5));
    }
    @keyframes aparecer {
      to { opacity: 1; transform: scale(1); }
    }
    .mensaje {
      position: absolute;
      bottom: 10%;
      color: #FFD54F;
      text-align: center;
      font-family: Arial;
      font-size: 18px;
      opacity: 0;
      animation: fade 1s ease 4s forwards;
    }
    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <img class="rosa" src="https://i.imgur.com/8QpR5Kj.png" alt="Rosas">
  
  <div class="mensaje">
    para ti...<br>
    🌹🧸
  </div>
</body>
</html>
