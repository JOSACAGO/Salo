<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌹 Para ti</title>
  <style>
    body {
      background: radial-gradient(circle, #1a1a2e, #0a0a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }
    svg {
      width: 80vw;
      max-width: 300px;
    }
    .linea {
      fill: none;
      stroke: #FF2D55;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dibujar 1.5s ease-out forwards;
    }
    .tallo { stroke: #00C853; }
    @keyframes dibujar {
      to { stroke-dashoffset: 0; }
    }
    .mensaje {
      position: absolute;
      bottom: 8%;
      color: #FFD700;
      text-align: center;
      font-size: 16px;
      padding: 0 20px;
      opacity: 0;
      animation: fade 2s ease 9s forwards;
    }
    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <svg viewBox="0 0 200 300">
    <!-- Tallo -->
    <path class="linea tallo" style="animation-delay: 0s" d="M100 280 L100 160"/>
    
    <!-- Hojas -->
    <path class="linea tallo" style="animation-delay: 1s" d="M100 220 Q75 200 85 230"/>
    <path class="linea tallo" style="animation-delay: 2s" d="M100 190 Q125 170 115 200"/>
    
    <!-- Pétalos -->
    <path class="linea" style="animation-delay: 3s" d="M100 160 Q70 130 100 100 Q130 130 100 160"/>
    <path class="linea" style="animation-delay: 4s" d="M100 155 Q75 120 100 95 Q125 120 100 155"/>
    <path class="linea" style="animation-delay: 5s" d="M100 150 Q80 115 100 90 Q120 115 100 150"/>
    <path class="linea" style="animation-delay: 6s" d="M100 145 Q90 125 100 110 Q110 125 100 145"/>
    <path class="linea" style="animation-delay: 7s" d="M90 140 Q100 120 110 140"/>
  </svg>
  
  <div class="mensaje">
    Cada línea que se dibujó...<br>
    fue pensando en ti 🌹💛
  </div>
</body>
</html>
