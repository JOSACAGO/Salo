<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌹 Para ti</title>
  <style>
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .rosa-container {
      width: 90vw;
      max-width: 350px;
      position: relative;
    }
    .petalo {
      opacity: 0;
      transform-origin: center;
      animation: florecer 0.8s ease-out forwards;
    }
    @keyframes florecer {
      0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .mensaje {
      position: absolute;
      bottom: -70px;
      width: 100%;
      color: #FFD54F;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 16px;
      opacity: 0;
      animation: fade 1s ease 5s forwards;
    }
    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="rosa-container">
    <svg viewBox="0 0 400 400">
      <defs>
        <radialGradient id="rojo1" cx="40%" cy="40%">
          <stop offset="0%" stop-color="#FF5252"/>
          <stop offset="60%" stop-color="#D50000"/>
          <stop offset="100%" stop-color="#8B0000"/>
        </radialGradient>
        <radialGradient id="rojo2" cx="40%" cy="40%">
          <stop offset="0%" stop-color="#FF1744"/>
          <stop offset="70%" stop-color="#C62828"/>
          <stop offset="100%" stop-color="#7F0000"/>
        </radialGradient>
        <linearGradient id="hoja" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#66BB6A"/>
          <stop offset="100%" stop-color="#2E7D32"/>
        </linearGradient>
      </defs>

      <!-- HOJAS - Aparecen primero -->
      <path class="petalo" style="animation-delay: 0s" fill="url(#hoja)" d="M110 280 C90 270, 85 300, 110 305 C135 300, 130 270, 110 280"/>
      <path class="petalo" style="animation-delay: 0.2s" fill="url(#hoja)" d="M290 290 C310 280, 325 295, 310 310 C285 310, 270 295, 290 290"/>
      <path class="petalo" style="animation-delay: 0.4s" fill="url(#hoja)" d="M200 330 C180 335, 185 355, 205 350 C225 345, 220 325, 200 330"/>

      <!-- ROSA IZQUIERDA PEQUEÑA -->
      <g class="petalo" style="animation-delay: 0.8s">
        <ellipse cx="110" cy="230" rx="35" ry="40" fill="url(#rojo2)"/>
        <ellipse cx="110" cy="225" rx="25" ry="30" fill="url(#rojo1)"/>
        <ellipse cx="110" cy="220" rx="15" ry="20" fill="#B71C1C"/>
      </g>

      <!-- ROSA DERECHA PEQUEÑA -->
      <g class="petalo" style="animation-delay: 1.2s">
        <ellipse cx="290" cy="240" rx="35" ry="40" fill="url(#rojo2)"/>
        <ellipse cx="290" cy="235" rx="25" ry="30" fill="url(#rojo1)"/>
        <ellipse cx="290" cy="230" rx="15" ry="20" fill="#B71C1C"/>
      </g>

      <!-- ROSA CENTRAL GRANDE -->
      <g class="petalo" style="animation-delay: 1.8s">
        <!-- Pétalos externos -->
        <ellipse cx="200" cy="180" rx="60" ry="70" fill="url(#rojo1)"/>
        <ellipse cx="170" cy="190" rx="40" ry="50" fill="url(#rojo2)" transform="rotate(-20 170 190)"/>
        <ellipse cx="230" cy="190" rx="40" ry="50" fill="url(#rojo2)" transform="rotate(20 230 190)"/>
        
        <!-- Pétalos medios -->
        <ellipse cx="200" cy="175" rx="45" ry="55" fill="url(#rojo2)"/>
        <ellipse cx="185" cy="180" rx="30" ry="40" fill="url(#rojo1)" transform="rotate(-15 185 180)"/>
        <ellipse cx="215" cy="180" rx="30" ry="40" fill="url(#rojo1)" transform="rotate(15 215 180)"/>
        
        <!-- Centro -->
        <ellipse cx="200" cy="170" rx="25" ry="35" fill="#8B0000"/>
        <ellipse cx="200" cy="165" rx="15" ry="25" fill="#4A0000"/>
      </g>
    </svg>
    
    <div class="mensaje">
      para ti...<br>
      🌹🧸
    </div>
  </div>
</body>
  </html>
