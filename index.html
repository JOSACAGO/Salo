<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌹 Para ti🧸</title>
  <style>
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 90vw;
      max-width: 400px;
    }
    svg {
      width: 100%;
      filter: drop-shadow(0 0 15px rgba(255,0,0,0.3));
    }
    .dibujar {
      fill: none;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: dibujar 3s ease-out forwards;
    }
    .relleno {
      opacity: 0;
      animation: aparecer 1s ease 3s forwards;
    }
    @keyframes dibujar {
      to { stroke-dashoffset: 0; }
    }
    @keyframes aparecer {
      to { opacity: 1; }
    }
    .mensaje {
      position: absolute;
      bottom: -60px;
      width: 100%;
      color: #FFD54F;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 16px;
      opacity: 0;
      animation: fade 1.5s ease 8s forwards;
    }
    @keyframes fade { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 400 400">
      <!-- Definir gradientes pa' que se vea realista -->
      <defs>
        <radialGradient id="rojo" cx="50%" cy="40%">
          <stop offset="0%" style="stop-color:#FF1744;stop-opacity:1" />
          <stop offset="70%" style="stop-color:#C62828;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
        </radialGradient>
        <radialGradient id="rojoOscuro" cx="50%" cy="40%">
          <stop offset="0%" style="stop-color:#D50000;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4A0000;stop-opacity:1" />
        </radialGradient>
        <linearGradient id="verde" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
        </linearGradient>
      </defs>

      <!-- Hojas traseras - 0s -->
      <path class="relleno" style="animation-delay: 3s" fill="url(#verde)" d="M120 280 L80 260 L90 300 Z"/>
      <path class="relleno" style="animation-delay: 3.2s" fill="url(#verde)" d="M280 290 L320 270 L310 310 Z"/>
      <path class="relleno" style="animation-delay: 3.4s" fill="url(#verde)" d="M200 320 L170 340 L190 350 Z"/>
      
      <path class="dibujar" style="animation-delay: 0s; stroke:#2E7D32; stroke-width:2" d="M120 280 L80 260 L90 300 Z"/>
      <path class="dibujar" style="animation-delay: 0.2s; stroke:#2E7D32; stroke-width:2" d="M280 290 L320 270 L310 310 Z"/>
      <path class="dibujar" style="animation-delay: 0.4s; stroke:#2E7D32; stroke-width:2" d="M200 320 L170 340 L190 350 Z"/>

      <!-- Rosa izquierda pequeña -->
      <path class="relleno" style="animation-delay: 4s" fill="url(#rojoOscuro)" d="M100 240 C80 220, 75 200, 100 190 C125 200, 120 220, 100 240"/>
      <path class="dibujar" style="animation-delay: 1s; stroke:#B71C1C; stroke-width:2" d="M100 240 C80 220, 75 200, 100 190 C125 200, 120 220, 100 240"/>

      <!-- Rosa derecha pequeña -->
      <path class="relleno" style="animation-delay: 4.5s" fill="url(#rojoOscuro)" d="M300 250 C280 230, 275 210, 300 200 C325 210, 320 230, 300 250"/>
      <path class="dibujar" style="animation-delay: 1.5s; stroke:#B71C1C; stroke-width:2" d="M300 250 C280 230, 275 210, 300 200 C325 210, 320 230, 300 250"/>

      <!-- Rosa central grande -->
      <!-- Pétalos externos -->
      <path class="relleno" style="animation-delay: 5s" fill="url(#rojo)" d="M200 200 C150 180, 130 130, 200 110 C270 130, 250 180, 200 200"/>
      <path class="dibujar" style="animation-delay: 2s; stroke:#D32F2F; stroke-width:2.5" d="M200 200 C150 180, 130 130, 200 110 C270 130, 250 180, 200 200"/>
      
      <!-- Pétalos medios -->
      <path class="relleno" style="animation-delay: 5.5s" fill="url(#rojo)" d="M200 195 C160 175, 150 135, 200 120 C250 135, 240 175, 200 195"/>
      <path class="dibujar" style="animation-delay: 2.5s; stroke:#C62828; stroke-width:2.5" d="M200 195 C160 175, 150 135, 200 120 C250 135, 240 175, 200 195"/>
      
      <!-- Pétalos internos -->
      <path class="relleno" style="animation-delay: 6s" fill="url(#rojoOscuro)" d="M200 190 C175 170, 175 140, 200 130 C225 140, 225 170, 200 190"/>
      <path class="dibujar" style="animation-delay: 3s; stroke:#8B0000; stroke-width:2" d="M200 190 C175 170, 175 140, 200 130 C225 140, 225 170, 200 190"/>
      
      <!-- Centro espiral -->
      <path class="relleno" style="animation-delay: 6.5s" fill="url(#rojoOscuro)" d="M200 185 C190 175, 190 155, 200 150 C210 155, 210 175, 200 185"/>
      <path class="dibujar" style="animation-delay: 3.5s; stroke:#4A0000; stroke-width:2" d="M200 185 C190 175, 190 155, 200 150 C210 155, 210 175, 200 185"/>
    </svg>
    
    <div class="mensaje">
      para ti...<br>
       🌹🧸
    </div>
  </div>
</body>
</html>
